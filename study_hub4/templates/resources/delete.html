<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <style>
        :root {
            --bg: #f7f3eb;
            --panel: rgba(255, 255, 255, 0.9);
            --text: #1f2937;
            --muted: #6b7280;
            --line: rgba(31, 41, 55, 0.12);
            --danger: #b91c1c;
            --shadow: 0 24px 52px rgba(15, 23, 42, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #faf6f0 0%, #f2ebe2 100%);
            padding: 32px 16px;
        }

        .page { width: min(680px, 100%); margin: 0 auto; }
        .panel {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-header, .panel-body { padding: 28px 32px; }
        .panel-header { border-bottom: 1px solid rgba(31, 41, 55, 0.08); }
        .top-nav { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 700;
            color: #0f766e;
            background: rgba(15, 118, 110, 0.08);
            border: 1px solid rgba(15, 118, 110, 0.14);
        }

        .eyebrow {
            display: inline-block;
            color: var(--danger);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        h1 { margin: 0 0 8px; font-size: clamp(2rem, 3vw, 2.6rem); line-height: 1; }
        p { margin: 0; color: var(--muted); line-height: 1.6; }
        .object-label {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(185, 28, 28, 0.08);
            font-weight: 700;
        }

        .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
        .button, button {
            min-height: 48px;
            padding: 0 20px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.95);
            color: var(--text);
            cursor: pointer;
        }

        .button-danger {
            border: 0;
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: #fff;
        }
    </style>
</head>
<body>
<main class="page">
    <section class="panel">
        <header class="panel-header">
            <nav class="top-nav" aria-label="Section links">
                <a class="nav-link" href="{% url 'student_list' %}">Students</a>
                <a class="nav-link" href="{% url 'task_list' %}">Tasks</a>
                <a class="nav-link" href="{% url 'notification_list' %}">Notifications</a>
                <a class="nav-link" href="{% url 'project_list' %}">Projects</a>
                <a class="nav-link" href="{% url 'course_list' %}">Courses</a>
                <a class="nav-link" href="{% url 'subject_list' %}">Subjects</a>
            </nav>
            <span class="eyebrow">{{ eyebrow }}</span>
            <h1>{{ heading }}</h1>
            <p>{{ description }}</p>
            <div class="object-label">{{ object_label }}</div>
        </header>

        <div class="panel-body">
            <form method="POST">
                {% csrf_token %}
                <div class="actions">
                    <button class="button-danger" type="submit">Confirm Delete</button>
                    <a class="button" href="{% url back_url %}">{{ back_label }}</a>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
